name: Bug Report
description: Report a bug in OpenAlfredo
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Run `oax pod`
        2. Open http://localhost:3000
        3. Send a message containing ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened instead.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: ollama-version
    attributes:
      label: Ollama version
      placeholder: "0.1.30"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Ollama model used
      placeholder: "llama3"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs from the terminal or `oax-web/data/logs/`.
      render: text
    validations:
      required: false
