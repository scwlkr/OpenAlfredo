name: Feature Request
description: Propose a new feature or enhancement for OpenAlfredo
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is frustrating or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of OAX does this touch?
      options:
        - Web UI
        - Chat engine
        - Memory system
        - AMBITION task layer
        - RESTLESS heartbeat
        - Telegram daemon
        - CLI (oax pod / oax pair)
        - Self-modification
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, links, related issues.
    validations:
      required: false
